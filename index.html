<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Amritaa 💙</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #74ebd5, #ACB6E5);
    text-align: center;
    overflow-x: hidden;
    color: #0a3d62;
}

/* Lock screen */
#lockScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #0a3d62;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: white;
    color: #0a3d62;
    cursor: pointer;
}

/* Main content */
#mainContent {
    display: none;
}

h1 {
    margin-top: 40px;
    font-size: 3em;
}

.typing {
    font-size: 1.5em;
    margin-top: 20px;
    height: 40px;
}

.gallery img {
    width: 200px;
    margin: 10px;
    border-radius: 15px;
}

/* Countdown */
#countdown {
    font-size: 1.5em;
    margin-top: 20px;
}

/* Floating hearts */
.heart {
    position: fixed;
    bottom: -10px;
    animation: rise 5s linear infinite;
}

@keyframes rise {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-800px); opacity: 0; }
}

/* Surprise */
#surprise {
    display: none;
    font-size: 1.5em;
    margin-top: 20px;
}
</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="lockScreen">
    <h2>Enter Secret 💙</h2>
    <input type="password" id="password" placeholder="Hint: her name">
    <button onclick="unlock()">Unlock 🔐</button>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent">

<h1>Happy Birthday Amritaa 💙</h1>

<div id="countdown"></div>

<div class="typing" id="typing"></div>

<button onclick="showSurprise()">Open My Heart 💖</button>

<div id="surprise">
    You are my everything 💙  
    I promise to always make you smile 🥺  
    I love you forever 💙
</div>

<h2>Our Memories 📸</h2>
<div class="gallery">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
</div>

<audio autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

</div>

<script>

// PASSWORD LOCK
function unlock() {
    let pass = document.getElementById("password").value.toLowerCase();
    if(pass === "amritaa") {
        document.getElementById("lockScreen").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
    } else {
        alert("Wrong password 😜");
    }
}

// COUNTDOWN (March 20)
let countDate = new Date("March 20, 2026 00:00:00").getTime();

let x = setInterval(function() {
    let now = new Date().getTime();
    let gap = countDate - now;

    let d = Math.floor(gap / (1000 * 60 * 60 * 24));
    let h = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    let m = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
    let s = Math.floor((gap % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
        "Countdown: " + d + "d " + h + "h " + m + "m " + s + "s";

}, 1000);

// TYPING TEXT
const text = "From the day I met you, my life changed 💙";
let i = 0;

function typingEffect() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typingEffect, 50);
    }
}
typingEffect();

// SURPRISE
function showSurprise() {
    document.getElementById("surprise").style.display = "block";
    launchHearts();
}

// HEARTS
function launchHearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "💙";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 10) + "px";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
    }, 200);
}

</script>
<audio autoplay loop muted id="bgMusic">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
document.body.addEventListener('click', function() {
  document.getElementById("bgMusic").muted = false;
  document.getElementById("bgMusic").play();
});
</script>
</body>
